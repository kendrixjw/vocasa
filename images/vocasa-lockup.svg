<svg viewBox="0 0 1200 1160" xmlns="http://www.w3.org/2000/svg">
  <!-- Vocasa vertical lockup: simplified mark + wordmark + tagline.
       Navy on transparent. For website headers, splash screens, print. -->

  <!-- ============ MARK (scaled, centered) ============ -->
  <g transform="translate(288, 40) scale(0.61)">
    <g fill="none" stroke="#1B2A4A" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 292 462 L 512 278 L 732 462" stroke-width="58"/>
      <line x1="150" y1="640" x2="222" y2="640" stroke-width="30"/>
      <line x1="802" y1="640" x2="874" y2="640" stroke-width="30"/>
    </g>
    <g fill="#1B2A4A">
      <rect x="459" y="368" width="46" height="46" rx="9"/>
      <rect x="519" y="368" width="46" height="46" rx="9"/>
      <rect x="459" y="428" width="46" height="46" rx="9"/>
      <rect x="519" y="428" width="46" height="46" rx="9"/>
    </g>
    <g fill="#1B2A4A">
      <rect x="249" y="610" width="30" height="60"  rx="15"/>
      <rect x="311" y="585" width="30" height="110" rx="15"/>
      <rect x="373" y="555" width="30" height="170" rx="15"/>
      <rect x="435" y="520" width="30" height="240" rx="15"/>
      <rect x="497" y="490" width="30" height="300" rx="15"/>
      <rect x="559" y="520" width="30" height="240" rx="15"/>
      <rect x="621" y="555" width="30" height="170" rx="15"/>
      <rect x="683" y="585" width="30" height="110" rx="15"/>
      <rect x="745" y="610" width="30" height="60"  rx="15"/>
    </g>
  </g>

  <!-- ============ WORDMARK ============ -->
  <text x="600" y="800"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        letter-spacing="2"
        fill="#1B2A4A">Vocasa</text>

  <!-- ============ TAGLINE with flanking rules ============ -->
  <g stroke="#1B2A4A" stroke-width="5" stroke-linecap="round">
    <line x1="150" y1="920" x2="255" y2="920"/>
    <line x1="945" y1="920" x2="1050" y2="920"/>
  </g>
  <text x="600" y="938"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="52"
        letter-spacing="6"
        fill="#1B2A4A">the voice-powered drafting app</text>
</svg>
