<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Vocasa app icon — simplified for small-size legibility.
       9 thick waveform bars (was ~20 thin), bold roofline, chunky window. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C4270"/>
      <stop offset="1" stop-color="#131F3B"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square tile (iOS-style). Drop this rect for a circular or bare export. -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M 292 462 L 512 278 L 732 462" stroke-width="58"/>
    <!-- Baseline stubs flanking the waveform -->
    <line x1="150" y1="640" x2="222" y2="640" stroke-width="30"/>
    <line x1="802" y1="640" x2="874" y2="640" stroke-width="30"/>
  </g>

  <!-- Window: chunky 2x2 -->
  <g fill="#FFFFFF">
    <rect x="459" y="368" width="46" height="46" rx="9"/>
    <rect x="519" y="368" width="46" height="46" rx="9"/>
    <rect x="459" y="428" width="46" height="46" rx="9"/>
    <rect x="519" y="428" width="46" height="46" rx="9"/>
  </g>

  <!-- Waveform: 9 bars, symmetric, centered on y=640 -->
  <g fill="#FFFFFF">
    <rect x="249" y="610" width="30" height="60"  rx="15"/>
    <rect x="311" y="585" width="30" height="110" rx="15"/>
    <rect x="373" y="555" width="30" height="170" rx="15"/>
    <rect x="435" y="520" width="30" height="240" rx="15"/>
    <rect x="497" y="490" width="30" height="300" rx="15"/>
    <rect x="559" y="520" width="30" height="240" rx="15"/>
    <rect x="621" y="555" width="30" height="170" rx="15"/>
    <rect x="683" y="585" width="30" height="110" rx="15"/>
    <rect x="745" y="610" width="30" height="60"  rx="15"/>
  </g>
</svg>
